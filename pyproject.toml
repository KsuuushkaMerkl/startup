# Команды:
# - Отформатировать код: ruff format
# - Проверить код (линт): ruff check
# - Проверить и автоисправить: ruff check --fix
# Если нужно проигронировать ошибку только в одном месте: # noqa: {код ошибки, на которую ругается линтер}


[tool.ruff]
# Автоматически исправлять найденные проблемы по умолчанию.
# Обычно удобнее держать false и запускать явно: `ruff check --fix`.
fix = true

# Папки/файлы, которые Ruff будет пропускать при проверке.
exclude = [
    ".git",
    ".ruff_cache",
    ".venv",
    "__pycache__",
]

# Дополнительно исключить пути, не трогая основной exclude (удобно расширять со временем)
extend-exclude = [
    "build",
    "dist",
    ".mypy_cache",
]

# Где Ruff должен искать "первичный" код проекта (если используешь src-layout).
# Если код лежит в корне проекта — оставь закомментированным.
# src = ["src"]

# Учитывать .gitignore (обычно Ruff и так учитывает, но явная настройка делает поведение понятным).
respect-gitignore = true

# Максимальная длина строки (важно для E501 и для форматтера).
line-length = 88

# Ширина отступа
indent-width = 4

# Целевая версия Python: влияет на правила и подсказки (UP и т.п.)
target-version = "py312"


[tool.ruff.lint]
# Настройки линтера (ruff check).

# База, которую обычно "включают и не жалеют":
# - E, W: pycodestyle (ошибки/предупреждения стиля; сюда входит E501 длина строки)
# - F: Pyflakes (реальные ошибки: неопределённые имена, неисп. импорты и т.д.)
# - I: isort (сортировка/группы импортов)
# - UP: pyupgrade (современный синтаксис под target-version)
# - B: flake8-bugbear (частые баги/опасные конструкции)
# - SIM: flake8-simplify (упрощения условий/конструкций)
# - C4: flake8-comprehensions (улучшения comprehensions)
# - N: pep8-naming (соглашения именования)
# - A: flake8-builtins (не затенять встроенные имена: list, id, dict...)
# - RUF: собственные полезные правила Ruff

# Какие правила включить (буквы/префиксы).
select = ["E", "W", "F", "I", "UP", "B", "SIM", "C4", "N", "A", "RUF"]

# Какие правила игнорировать.
ignore = []

# Какие правила Ruff имеет право авто-чинить при запуске с `--fix`.
fixable = ["ALL"]
unfixable = []

# Разрешить "фиктивные" переменные, которые начинаются с подчёркивания.
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

# Игноры по файлам: часто нужно, чтобы не мешало в тестах/инициализации пакета.
per-file-ignores = { "tests/**" = ["F401", "F841"], "__init__.py" = ["F401"] }
# в тестах иногда допустимы неисп. импорты/переменные
# в __init__.py импорты могут быть "экспортом" API пакета



# Опционально строгие вещи (включай осознанно):
# - S: bandit (безопасность) может быть шумным в учебных проектах
# - T20: запрет print
# - D: docstring стиль (часто слишком строго для новичков)
#
# Чтобы включить — добавь "S" / "T20" / "D" в select.

# Если включишь C90 (сложность), можно задать порог:
# (и добавить "C90" в select)
# [tool.ruff.lint.mccabe]
# max-complexity = 10

# Настройки isort (работает, если включён "I")
# [tool.ruff.lint.isort]
# combine-as-imports = true
# known-first-party = ["your_package_name"]


[tool.ruff.format]
# Настройки форматтера (ruff format), по стилю близко к Black.

# Строки в двойных кавычках: "text" вместо 'text'.
quote-style = "double"

# Отступы пробелами (а не табами).
indent-style = "space"

# Уважать "магические" висячие запятые.
skip-magic-trailing-comma = false

# Автоопределение перевода строк (LF/CRLF).
line-ending = "auto"

# Форматировать ли примеры кода внутри docstring’ов.
docstring-code-format = false

# Ограничение длины строк при форматировании кода в docstring’ах
# (работает только если docstring-code-format = true).
docstring-code-line-length = "dynamic"